    <!-- 阻塞脚本：在渲染前设置外观属性，防止深色模式下白屏闪烁 -->
    <script>
        (function() {
            var mode = localStorage.getItem('marklook-appearance') || 'system';
            document.documentElement.setAttribute('data-appearance', mode);
            var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        })();
    </script>

            </select>
            <button class="theme-trigger" id="theme-trigger" title="Theme & Appearance">

                <span class="aa-divider"></span>
                <span class="aa-theme-name" id="aa-theme-name">默认</span>

    <!-- 主题弹窗 -->
    <div class="theme-popover" id="theme-popover">
        <!-- 外观 -->
        <div class="popover-section">
            <div class="popover-section-title">外观 Appearance</div>
            <div class="appear-group" id="appear-group">
                <button class="appear-option" data-mode="system">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" />
                        <path d="M8 21h8M12 17v4" />
                    </svg>
                    <span>System</span>
                </button>
                <button class="appear-option" data-mode="light">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <path
                            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                    <span>Light</span>
                </button>
                <button class="appear-option" data-mode="dark">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                    <span>Dark</span>
                </button>
            </div>
            <!-- 字号（内联在外观 section 下方） -->
            <div class="fontsize-row">
                <span class="fontsize-label" id="section-title-fontsize">字号</span>
                <div class="fontsize-stepper" id="fontsize-stepper">
                    <button class="stepper-btn" id="fontsize-minus" title="Decrease">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                    </button>
                    <span class="stepper-value" id="fontsize-value">17px</span>
                    <button class="stepper-btn" id="fontsize-plus" title="Increase">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- 分割线 -->
        <div class="popover-divider"></div>
        <!-- 主题 -->
        <div class="popover-section">
            <div class="popover-section-title">主题 Theme</div>
            <div class="theme-list" id="theme-list">

                    </div>
                    <svg class="theme-lock" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                        <rect x="3" y="11" width="18" height="11" rx="2" />
                        <path d="M7 11V7a5 5 0 0110 0v4" />
                    </svg>
                </button>
                <button class="theme-option" data-theme="bear" data-locked>

                        <span class="theme-name">手帐</span>

                    <svg class="theme-lock" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
